# Allow @Primary beans in TestAwsSecretsConfig to override @Configuration beans from main sources
spring.main.allow-bean-definition-overriding=true

# Dummy AWS credentials — real clients are replaced by @Primary mocks in TestAwsSecretsConfig
aws.iam.user.accessKey=test-access-key
aws.iam.user.secretKey=test-secret-key
aws.secretsmanager.secretName.socialnetwork-security-private-public-keys=test-secret

# Test email settings
socialnetwork.email.from=test@socialnetwork.local
socialnetwork.email.verify-base-url=http://localhost/api/v1/auth/verify?token=

# Reduce noise in test logs
spring.jpa.show-sql=false
