# Application name
spring.application.name=socialnetwork-app

# Application port
server.port=8080

# Profile
spring.profiles.active=local

# Spring: Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Spring: PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/socialnetwork_db
spring.datasource.username=socialnetwork_user
spring.datasource.password=socialnetwork_password

# Liquibase Configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# SocialNetwork Custom Properties
socialnetwork.email.from=mail@skov.dev
socialnetwork.email.verify-base-url=http://localhost:8080/api/v1/auth/verify?token=

# AWS IAM User Access
aws.iam.user.accessKey=${AWS_ACCESS_KEY_ID}
aws.iam.user.secretKey=${AWS_SECRET_ACCESS_KEY}

# AWS Secrets Manager
aws.secretsmanager.secretName.socialnetwork-security-private-public-keys=socialnetwork-security-private-public-keys
